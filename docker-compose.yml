version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: drivelink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: drivelink
      POSTGRES_PASSWORD: drivelink_dev
      POSTGRES_DB: drivelink_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivelink"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drivelink_redis
    restart: unless-stopped
    command: redis-server --requirepass drivelink_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "drivelink_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: drivelink_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
